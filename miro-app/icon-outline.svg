<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Beat shape: / ^ _ representing a ramp-spike-hold arc sequence -->
  <polyline
    points="8,48  20,48  28,20  36,20  44,36  56,36"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Small tick marks on x-axis suggesting discrete plays -->
  <line x1="14" y1="50" x2="14" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="50" x2="24" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="50" x2="40" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
