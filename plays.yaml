arc_fit: [escalate, climax]
beat_function: spike
somatic: |
  induces: genuine grief response — because the loss was real within the participant's emotional world · requires: sustained prior relationship with character, org, or narrative stake; never cold; always L3+
identity_invite: |
  person who had something they cared about and lost it — and must decide what that means
reinforce: |
  what happens after the loss is the most critical beat: the debrief, the return or absence, the memorial artifact; the grief is the content, not the problem to be solved
permission: |
  requires explicit sponsor consent; never standalone; highest oversight level; sequenced at climax only
emotional_register: |
  grief
agency_demand: passive
