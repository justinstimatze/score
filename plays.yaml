identity_invite: |
  someone whose inner life produces material worth attending to
reinforce: |
  Day 1 — dream request sent the evening before. Day 2 morning — participant prompted to report within 15 minutes of waking. Day 2–3 — arc responds to content with a specific observation, not interpretation. Day 7 — second request, if the first generated engagement.
permission: |
  standalone after open · grants further somatic data channels
emotional_register: |
