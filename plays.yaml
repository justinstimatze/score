id: accidental_transmission
title: The Accidental Transmission
cost: free
autonomy: agent
lead_time: same day
intensity: high
mechanisms: [curiosity_exploration, confirmation_bias, significance_quest]
arc_fit: [build, escalate, revelation]
beat_function: ramp
