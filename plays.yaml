  induces: furtive excitement, the overhearing sensation — "I wasn't meant to see this" · requires: baseline; works cold
identity_invite: |
  person who accidentally found themselves behind a curtain
reinforce: |
  subsequent "correction" or recall attempt amplifies the sense that something was exposed; follow-up that treats the slip as sensitive
permission: |
  standalone; grants investigation permission naturally without requiring explicit invitation
emotional_register: |
  wonder · urgency
