identity_invite: |
  someone who knew something before they knew they knew it
reinforce: |
  When the arc opens and introduces a specific concept, fact, or story as central — and the participant feels they have heard this before without knowing where — the arc can name the plant: "You may have heard something about this already. You did. Three weeks ago." The participant's felt recognition is confirmed and recontextualized. They were already inside the arc's information environment before it officially began.
permission: |
  Standalone opener. Grants the deepest form of ambient-world permission — the arc's information was already in the participant's mental environment, indistinguishable from their own knowledge.
