identity_invite: |
  someone whose body can do what is asked of it
reinforce: |
  Day 1 — threshold announced. Day 2 — participant reports achievement (or the arc detects it via wearable data). Day 2 + 1 hour — next beat unlocks with explicit acknowledgment: "Your body opened that."
permission: |
  standalone · grants access to the next arc beat it protects · requires sleep_data_mirror or wearable data for automated detection
emotional_register: |
  triumph · awe · warmth · urgency
agency_demand: high
