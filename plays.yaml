desc: |
  A message delivered through the participant's real physical environment with no digital component. No channel, no account, no deliverability problem. The physical world, waiting for them.
  
  Forms:
  - Chalk on a specific sidewalk they walk, at a precise location on their route — a name, a phrase, a symbol
  - A business card on their windshield in a lot they regularly use, referencing something specific to them
  - A sticker on a lamppost, signpost, or utility box at a point on their route — readable to anyone but addressed to them
  - A page or fragment tucked under a wiper blade, left on a park bench they use, or placed in a door crack
  - An object left at a location they frequent — a coffee shop table, a gym locker area — that is clearly for them
  
