beat_function: ramp
somatic: |
  induces: repeated micro-awareness moments throughout day, accumulated somatic attentiveness · requires: participant ambulatory in their normal daily environment for at least 8 hours
identity_invite: |
  someone who notices when one state becomes another
reinforce: |
  Day 1 — instruction sent. Day 2 — brief acknowledgment: "You crossed a lot of them." Day 3 — the arc names what threshold means in its own logic.
permission: |
  standalone · grants contemplative_walk_instruction
emotional_register: |
  wonder · awe · disorientation · tenderness
agency_demand: low
