  induces: shock of recognition, temporal dislocation, profound felt continuity · requires: sufficient time has elapsed since introduction (minimum 4 weeks)
identity_invite: |
  the person who held on to something without knowing why, and was right to
reinforce: |
  Day 0 of activation: the dormant frequency fires. Day 1-3: a beat that uses the content of the dormancy period (what was it listening to, what did it record?).
