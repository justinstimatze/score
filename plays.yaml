section: |
  GRAIN & TEXTURE
desc: |
  The participant's own real, publicly available history reframed as having been narrative-relevant before the experience began.
  
  A real post they made three years ago. A real photo they published. A real event they attended. A real thing they wrote in a public forum. Something that actually predates the experience by months or years, now presented as evidence that the pattern was already there — that the experience didn't start when they thought it started.
  
  This is `retroactive_meaning` at a deeper level. `retroactive_meaning` plants details early in the experience that gain significance later. `retroactive_recontextualization` uses material that predates the experience entirely — material the operator didn't create, material that is genuinely the participant's own past, material that exists because it's real.
  
  "We've been aware of you since [real event]." Backed by evidence that can only exist because it's actually real. The participant can verify it. They know it's real. They were there.
  
  The experience doesn't begin at first contact. It began before they knew it was happening.
  
  Requires extensive OSINT prep: surfacing genuine historical material that is thematically connectable to the arc. The agent identifies candidates; the human operator judges which are appropriate to deploy.
failure_modes:
  - OSINT surfaces material that is too sensitive — review carefully; avoid anything touching loss, illness, or relationship endings unless explicitly in scope per intake
