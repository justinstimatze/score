identity_invite: |
  someone whose unconscious processes are in contact with something larger
reinforce: |
  Day 1 evening — image seed delivered. Day 2 morning — brief follow-on: "Did anything surface?" (no pressure, no analysis). Day 5 — second seed, related but evolved.
