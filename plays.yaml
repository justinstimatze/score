desc: |
  An artifact that was clearly made specifically about the participant — not personalized, not customized, not addressed to them — made *about* them. A painting of a real moment from their life they never published. Music whose lyrics reference non-public details. A poem about something specific they once said. A physical object that could only be a reference to their particular history.
  
