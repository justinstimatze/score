identity_invite: |
  the one whose history is known and held by something outside themselves
reinforce: |
  24h: nothing — silence is the follow-on. 1 week: a second message that references "last week" obliquely. 1 month: a brief note that uses a phrase from the original anniversary message as if recalling it.
